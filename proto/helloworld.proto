syntax = "proto3";

package hello;

option go_package = "proto/genproto/";

message HelloRequest{
  string name = 1;
}

message HelloResponse{
  int32 code = 1;
  string value = 2;
}

// 定义我们的服务（可定义多个服务,每个服务可定义多个接口）
service HelloService {
  rpc SayHello (HelloRequest) returns (HelloResponse){};
}

